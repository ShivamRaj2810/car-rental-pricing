<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #141e30, #243b55);
}

/* Glass Card */
.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 20px;
    width: 340px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    animation: fadeIn 0.8s ease;
}

/* Title */
.card h2 {
    margin-bottom: 25px;
    font-weight: 600;
}

/* Inputs */
.input-box {
    position: relative;
    margin: 15px 0;
}

.input-box input {
    width: 100%;
    padding: 12px 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Result */
#result {
    margin-top: 15px;
    font-weight: bold;
}

.success { color: #00ffcc; }
.error { color: #ff4d4d; }

/* Loader */
.loader {
    display: none;
    margin-top: 10px;
}

/* Link */
a {
    color: #ddd;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">
    <h2>🚗 Welcome Back</h2>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button onclick="login()">Login</button>

    <div class="loader" id="loader">⏳ Logging in...</div>

    <p id="result"></p>

    <p style="margin-top:15px;">
        New here? <a href="register.html">Create account</a>
    </p>
</div>

<script>
const BASE_URL = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost"
    ? "http://127.0.0.1:8000"
    : "https://car-rental-pricing.onrender.com";

// Redirect if already logged in
if (localStorage.getItem("token")) {
    window.location.href = "index.html";
}

async function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let result = document.getElementById("result");
    let loader = document.getElementById("loader");

    if (!email || !password) {
        result.innerHTML = "❌ Fill all fields";
        result.className = "error";
        return;
    }

    loader.style.display = "block";
    result.innerHTML = "";

    let formData = new URLSearchParams();
    formData.append("username", email);
    formData.append("password", password);

    try {
        let res = await fetch(`${BASE_URL}/token`, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: formData
        });

        loader.style.display = "none";

        if (!res.ok) {
            result.innerHTML = "❌ Invalid credentials";
            result.className = "error";
            return;
        }

        let data = await res.json();
        localStorage.setItem("token", data.access_token);

        result.innerHTML = "✅ Login successful";
        result.className = "success";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 800);

    } catch (err) {
        loader.style.display = "none";
        result.innerHTML = "❌ Server error";
        result.className = "error";
    }
}
</script>

</body>
</html>
