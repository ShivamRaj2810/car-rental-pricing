<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ride Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
}

.header {
    background: black;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h3 {
    margin: 0;
}

.header button {
    background: white;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
    font-size: 14px;
}

.cards {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
}

.card.selected {
    border: 2px solid black;
}

button.main {
    width: 100%;
    padding: 15px;
    background: black;
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
    font-size: 15px;
}

button.main:hover {
    background: #222;
}

.result {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    display: none;
}

.price {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
    <h3>🚗 Ride Booking</h3>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">

    <!-- Locations -->
    <input id="pickup" placeholder="📍 Pickup (e.g. Ranchi Railway Station)">
    <input id="drop" placeholder="🏁 Drop (e.g. Airport)">

    <!-- Cars -->
    <div class="cards">
        <div class="card" onclick="selectCar(this,500,'Hatchback')">
            <div>🚗 Hatchback</div>
            <div>₹500</div>
        </div>

        <div class="card" onclick="selectCar(this,1000,'Sedan')">
            <div>🚘 Sedan</div>
            <div>₹1000</div>
        </div>

        <div class="card" onclick="selectCar(this,1500,'SUV')">
            <div>🚙 SUV</div>
            <div>₹1500</div>
        </div>
    </div>

    <button class="main" onclick="getPrice()">Check Price</button>
    <button id="bookBtn" class="main" onclick="bookRide()" style="display:none;">Book Ride</button>

    <div class="result" id="result"></div>

</div>

<script>

// 🔐 Check login FIRST
let token = localStorage.getItem("token");

if (!token) {
    window.location.href = "login.html";
}

// 🌐 Backend URL
const BASE_URL =
    window.location.hostname === "localhost" ||
    window.location.hostname === "127.0.0.1"
    ? "http://127.0.0.1:8000"
    : "https://car-rental-backend-zv56.onrender.com";
    
let selectedPrice = null;
let selectedCar = "";

// 🚗 Select car
function selectCar(el, price, car) {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
    el.classList.add("selected");

    selectedPrice = price;
    selectedCar = car;
}

// 🔐 Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/login.html";
}

// 💰 Get price
async function getPrice() {

    let pickup = document.getElementById("pickup").value.trim();
    let drop = document.getElementById("drop").value.trim();

    if (!selectedPrice || !pickup || !drop) {
        alert("Select car + enter pickup & drop");
        return;
    }

    let resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "⏳ Calculating...";

    console.log("Token:", token);

    try {
        let res = await fetch(`${BASE_URL}/predict_price`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                pickup,
                drop,
                base_price: selectedPrice
            })
        });

        let text = await res.text();
        console.log("Response:", text);

        if (!res.ok) {
            resultDiv.innerHTML = "❌ " + text;
            return;
        }

        let data = JSON.parse(text);

        resultDiv.innerHTML = `
            <div><strong>${selectedCar}</strong></div>
            <div>📍 ${data.pickup} → ${data.drop}</div>
            <div>📏 Distance: ${data.distance_text}</div>
            <div class="price">₹${data.dynamic_price.toFixed(2)}</div>
            <div>🌦 Weather: ${data.weather}</div>
            <div>📈 Demand: ${data.demand.toFixed(2)}</div>
        `;

        document.getElementById("bookBtn").style.display = "block";

    } catch (err) {
        console.error(err);
        resultDiv.innerHTML = "❌ Server error";
    }
}

// 🚘 Book ride
async function bookRide() {

    try {
        let res = await fetch(`${BASE_URL}/book`, {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        let data = await res.json();

        document.getElementById("result").innerHTML = `
            ✅ Ride Confirmed!<br><br>
            🚗 ${selectedCar}<br>
            ⭐ New Rating: ${data.new_rating}<br>
            🚘 Driver arriving in 5 mins
        `;

    } catch (err) {
        document.getElementById("result").innerHTML = "❌ Booking failed";
    }
}

</script>

</body>
</html>
