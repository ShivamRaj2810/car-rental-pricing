<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ride Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#f5f5f5; }
.header { background:black; color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; }
.container { max-width:500px; margin:auto; padding:20px; }
input { width:100%; padding:14px; border-radius:10px; border:1px solid #ccc; margin-bottom:15px; }
.card { background:white; padding:15px; border-radius:15px; display:flex; justify-content:space-between; cursor:pointer; margin-bottom:10px; }
.card.selected { border:2px solid black; }
button.main { width:100%; padding:15px; background:black; color:white; border:none; border-radius:10px; cursor:pointer; }
.result { margin-top:20px; background:white; padding:15px; border-radius:10px; display:none; }
</style>
</head>
<body>

<div class="header">
    <h3>🚗 Ride Booking</h3>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">
<input id="pickup" placeholder="📍 Pickup">
<input id="drop" placeholder="🏁 Drop">

<div class="card" onclick="selectCar(this,500,'Hatchback')"><div>🚗 Hatchback</div><div>₹500</div></div>
<div class="card" onclick="selectCar(this,1000,'Sedan')"><div>🚘 Sedan</div><div>₹1000</div></div>
<div class="card" onclick="selectCar(this,1500,'SUV')"><div>🚙 SUV</div><div>₹1500</div></div>

<button class="main" onclick="getPrice()">Check Price</button>
<button id="bookBtn" class="main" onclick="bookRide()" style="display:none;">Book Ride</button>
<div class="result" id="result"></div>
</div>

<script>
// ✅ BASE URL
const BASE_URL = "https://car-rental-backend-zv56.onrender.com";

// ✅ TOKEN HANDLING
let token = localStorage.getItem("token");
if (!token) {
    alert("Please login first");
    window.location.href = "login.html";
}

let selectedPrice = null;
let selectedCar = "";

// 🚗 SELECT CAR
function selectCar(el, price, car) {
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    el.classList.add("selected");
    selectedPrice = price;
    selectedCar = car;
}

// 🔐 LOGOUT
function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

// 🔹 FETCH WITH TIMEOUT
async function fetchWithTimeout(url, options={}, timeout=10000) {
    return Promise.race([
        fetch(url, options),
        new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), timeout))
    ]);
}

// 💰 GET PRICE
async function getPrice() {
    let pickup = document.getElementById("pickup").value.trim();
    let drop = document.getElementById("drop").value.trim();
    if (!selectedPrice || !pickup || !drop) {
        alert("Select car and enter locations");
        return;
    }

    let resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "⏳ Calculating...";

    try {
        let res = await fetchWithTimeout(`${BASE_URL}/predict_price`, {
            method:"POST",
            headers: {
                "Content-Type":"application/json",
                "Authorization":"Bearer "+token
            },
            body: JSON.stringify({pickup, drop, base_price:selectedPrice})
        }, 15000); // 15s timeout

        if (res.status===401) {
            alert("Session expired. Login again.");
            logout();
            return;
        }

        let data = await res.json();
        if (!res.ok) {
            resultDiv.innerHTML = "❌ "+(data.detail || "Error");
            return;
        }

        resultDiv.innerHTML = `
            <b>${selectedCar}</b><br>
            📍 ${data.pickup} → ${data.drop}<br>
            📏 ${data.distance_text}<br>
            💰 ₹${data.dynamic_price.toFixed(2)}<br>
            🌦 ${data.weather}<br>
        `;
        document.getElementById("bookBtn").style.display = "block";

    } catch(err) {
        console.error(err);
        resultDiv.innerHTML = "❌ Server error or timeout";
    }
}

// 🚘 BOOK RIDE
async function bookRide() {
    let resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "⏳ Booking...";

    try {
        let res = await fetchWithTimeout(`${BASE_URL}/book`, {
            method:"POST",
            headers:{ "Authorization":"Bearer "+token }
        }, 10000);

        if (res.status===401) {
            alert("Login expired");
            logout();
            return;
        }

        let data = await res.json();
        resultDiv.innerHTML = `✅ Ride Booked<br>⭐ Rating: ${data.new_rating}`;

    } catch(err) {
        console.error(err);
        resultDiv.innerHTML = "❌ Booking failed or timeout";
    }
}
</script>
</body>
</html>
