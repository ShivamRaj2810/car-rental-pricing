<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00c6ff;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.03);
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }

        .success {
            color: #00ffcc;
        }

        .error {
            color: #ff4d4d;
        }

        .loader {
            display: none;
            margin-top: 10px;
        }

        a {
            color: #ffd;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🚗 Car Rental Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="loader" id="loader">⏳ Logging in...</div>

    <p id="result"></p>

    <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>

const BASE_URL = "https://car-rental-pricing.onrender.com";

async function login() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let result = document.getElementById("result");
    let loader = document.getElementById("loader");

    if (!email || !password) {
        result.innerHTML = "❌ Fill all fields";
        result.className = "error";
        return;
    }

    loader.style.display = "block";
    result.innerHTML = "";

    let formData = new URLSearchParams();
    formData.append("username", email);
    formData.append("password", password);

    try {
        let res = await fetch(`${BASE_URL}/token`, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: formData
        });

        let data = await res.json();

        loader.style.display = "none";

        if (data.access_token) {
            localStorage.setItem("token", data.access_token);

            result.innerHTML = "✅ Login successful";
            result.className = "success";

            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);

        } else {
            result.innerHTML = "❌ Invalid email or password";
            result.className = "error";
        }

    } catch (err) {
        loader.style.display = "none";
        result.innerHTML = "❌ Server error";
        result.className = "error";
    }
}

</script>

</body>
</html>
