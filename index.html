<!DOCTYPE html>
<html>
<head>
<title>Ride Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
}

/* Header */
.header {
    background: black;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header button {
    background: white;
    color: black;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

/* Container */
.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
}

/* Cards */
.cards {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

.card.selected {
    border: 2px solid black;
}

/* Buttons */
button.main {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: black;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

/* Result Card */
.result {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    display: none;
}

.price {
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <h3>🚗 Ride</h3>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">

    <!-- Pickup & Drop -->
    <input type="text" id="pickup" placeholder="📍 Enter pickup location">
    <input type="text" id="drop" placeholder="🏁 Enter drop location">

    <!-- Ride Options -->
    <div class="cards">

        <div class="card" onclick="selectCar(this,1500,'Hatchback')">
            <div>
                <strong>🚗 Hatchback</strong><br>
                <small>Affordable rides</small>
            </div>
            <div>₹1500</div>
        </div>

        <div class="card" onclick="selectCar(this,2000,'Sedan')">
            <div>
                <strong>🚘 Sedan</strong><br>
                <small>Comfort rides</small>
            </div>
            <div>₹2000</div>
        </div>

        <div class="card" onclick="selectCar(this,3000,'SUV')">
            <div>
                <strong>🚙 SUV</strong><br>
                <small>Premium rides</small>
            </div>
            <div>₹3000</div>
        </div>

    </div>

    <button class="main" onclick="getPrice()">Check Price</button>
    <button id="bookBtn" class="main" onclick="bookRide()" style="display:none;">Book Ride</button>

    <!-- Result -->
    <div class="result" id="result"></div>

</div>

<script>

// 🔐 Protect page
if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
}

const BASE_URL = "http://127.0.0.1:8000";

let selectedPrice = null;
let selectedCar = "";

// Select car
function selectCar(el, price, car) {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
    el.classList.add("selected");

    selectedPrice = price;
    selectedCar = car;
}

// Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

// Get price
async function getPrice() {

    let pickup = document.getElementById("pickup").value;
    let drop = document.getElementById("drop").value;

    if (!selectedPrice || !pickup || !drop) {
        alert("Select ride & enter pickup + drop");
        return;
    }

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML = "⏳ Calculating...";

    let token = localStorage.getItem("token");

    try {
        let res = await fetch(`${BASE_URL}/predict_price`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                location: pickup,
                base_price: selectedPrice
            })
        });

        if (!res.ok) {
            document.getElementById("result").innerHTML = "❌ Error fetching price";
            return;
        }

        let data = await res.json();

        document.getElementById("result").innerHTML = `
            <div><strong>${selectedCar}</strong></div>
            <div>📍 ${pickup} → ${drop}</div>
            <div class="price">₹${data.dynamic_price.toFixed(2)}</div>
            <div>📈 Demand: ${data.demand.toFixed(2)}</div>
        `;

        // ✅ Show Book button
        document.getElementById("bookBtn").style.display = "block";

    } catch (err) {
        document.getElementById("result").innerHTML = "❌ Server error";
    }
}

// Book ride
function bookRide() {
    let pickup = document.getElementById("pickup").value;
    let drop = document.getElementById("drop").value;

    document.getElementById("result").innerHTML = `
        ✅ Ride Confirmed!<br>
        🚗 ${selectedCar}<br>
        📍 ${pickup} → ${drop}<br>
        🚘 Driver arriving in 5 mins
    `;
}

</script>

</body>
</html>
